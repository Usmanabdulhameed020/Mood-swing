<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <!-- Gradients -->
    <linearGradient id="headband-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="50%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#f43f5e" />
    </linearGradient>
    
    <linearGradient id="note-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>

    <linearGradient id="glow-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0" />
    </linearGradient>

    <!-- Drop shadows -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#a855f7" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- Background circle for soft glow -->
  <circle cx="50" cy="50" r="46" fill="url(#glow-grad)" opacity="0.5" />

  <!-- Headphone Headband -->
  <path d="M 22 52 A 30 30 0 0 1 78 52" stroke="url(#headband-grad)" stroke-width="7" stroke-linecap="round" filter="url(#shadow)" />
  
  <!-- Headband Inner Cushion -->
  <path d="M 27 50 A 25 25 0 0 1 73 50" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" opacity="0.3" />

  <!-- Earpads (Left & Right) -->
  <!-- Left Earpad -->
  <rect x="15" y="44" width="10" height="22" rx="5" fill="url(#headband-grad)" filter="url(#shadow)" />
  <rect x="18" y="47" width="4" height="16" rx="2" fill="#ffffff" opacity="0.2" />

  <!-- Right Earpad -->
  <rect x="75" y="44" width="10" height="22" rx="5" fill="url(#headband-grad)" filter="url(#shadow)" />
  <rect x="78" y="47" width="4" height="16" rx="2" fill="#ffffff" opacity="0.2" />

  <!-- Swinging / Slanted Music Note -->
  <!-- Slanted connecting bar -->
  <path d="M 44 38 L 64 33" stroke="url(#note-grad)" stroke-width="6" stroke-linecap="round" filter="url(#shadow)" />
  
  <!-- Note Stem 1 -->
  <path d="M 46 38 L 41 58" stroke="url(#note-grad)" stroke-width="4" stroke-linecap="round" filter="url(#shadow)" />
  
  <!-- Note Stem 2 -->
  <path d="M 62 34 L 57 54" stroke="url(#note-grad)" stroke-width="4" stroke-linecap="round" filter="url(#shadow)" />

  <!-- Note Head 1 (slanted ellipse) -->
  <g transform="translate(39, 58) rotate(-20)">
    <ellipse cx="0" cy="0" rx="7" ry="5.5" fill="url(#note-grad)" filter="url(#shadow)" />
    <!-- Highlight -->
    <ellipse cx="-2" cy="-1.5" rx="2" ry="1.5" fill="#ffffff" opacity="0.4" />
  </g>

  <!-- Note Head 2 (slanted ellipse) -->
  <g transform="translate(55, 54) rotate(-20)">
    <ellipse cx="0" cy="0" rx="7" ry="5.5" fill="url(#note-grad)" filter="url(#shadow)" />
    <!-- Highlight -->
    <ellipse cx="-2" cy="-1.5" rx="2" ry="1.5" fill="#ffffff" opacity="0.4" />
  </g>

  <!-- Motion trails for "Swing" -->
  <path d="M 33 66 A 25 25 0 0 0 67 66" stroke="url(#headband-grad)" stroke-width="2" stroke-linecap="round" stroke-dasharray="2 6" opacity="0.6" />
  <path d="M 38 72 A 30 30 0 0 0 62 72" stroke="url(#note-grad)" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="1 8" opacity="0.4" />
</svg>